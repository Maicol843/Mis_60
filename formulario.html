<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/60.png" type="image/png">
    <title>RICARDO ROBLES | Confirmar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #090127;
            color: white;
            font-family: 'Roboto Condensed', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .form-container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(140, 201, 225, 0.3);
        }
        h2 { color: #8cc9e1; text-align: center; margin-bottom: 25px; }
        .form-label { font-weight: bold; }
        .btn-send, .btn-atras{
            background-color: #8cc9e1 !important;
            color: #090127 !important;
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: bold;
            border-radius: 10px;
            width: 100%;
            margin-top: 20px;
            border: 1px solid black;
            padding: 12px;
        }
        .form-check-input:checked {
            background-color: #8cc9e1;
            border-color: #8cc9e1;
        }
    </style>
</head>
<body class="container">

    <div class="form-container shadow-lg">
        <h2>Confirmar Asistencia</h2>
        
        <form id="attendanceForm">
            <div class="mb-4">
                <label for="fullName" class="form-label">Nombre Completo:</label>
                <input type="text" class="form-control" id="fullName" placeholder="Escribe tu nombre aquí" required>
            </div>

            <div class="mb-4">
                <label class="form-label d-block">¿Podrás asistir?</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="attendance" id="si" value="Si, allí estaré" checked>
                    <label class="form-check-label" for="si">Si, allí estaré</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="attendance" id="no" value="No puedo asistir, lo siento">
                    <label class="form-check-label" for="no">No puedo asistir, lo siento</label>
                </div>
            </div>
            <div class="btn-group d-flex justify-content-center align-items-center">
                <a href="index.html" type="button" class="btn btn-outline-info btn-atras">ATRAS</a>
                <button type="submit" class="btn btn-send">ENVIAR</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('attendanceForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Configuración
            const phoneNumber = "5493584875892"; // CAMBIA ESTO por tu número (Código país + número sin el +)
            
            // Obtener datos
            const name = document.getElementById('fullName').value;
            const attendance = document.querySelector('input[name="attendance"]:checked').value;

            // Construir mensaje
            // Usamos \n para saltos de línea
            let message = `Hola! Soy *${name}*.\nConfirmación de asistencia: *${attendance}*`;

            // Codificar para URL
            const encodedMessage = encodeURIComponent(message);
            
            // Abrir WhatsApp
            window.open(`https://wa.me/${phoneNumber}?text=${encodedMessage}`, '_blank');
        });
    </script>

</body>
</html>
